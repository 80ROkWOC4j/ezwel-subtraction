name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate script syntax
        run: node --check ezwel-subtraction.user.js

      - name: Verify tag matches script version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME}"
          script_version="$(sed -n 's#// @version[[:space:]]*##p' ezwel-subtraction.user.js | head -n 1 | xargs)"

          if [[ -z "$script_version" ]]; then
            echo "Could not read @version from ezwel-subtraction.user.js"
            exit 1
          fi

          if [[ "$tag_version" != "$script_version" ]]; then
            echo "Tag version ($tag_version) does not match script version ($script_version)"
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ezwel-subtraction.user.js
          fail_on_unmatched_files: true
          generate_release_notes: false
